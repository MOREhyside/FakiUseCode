<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --cyan: #00f2ff;
            --blue: #0072ff;
            --bg: #05070a;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .promo-card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 4px; /* Keret vastagsága */
            border-radius: 16px;
            display: inline-flex;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        /* Animált RGB/Kék keret */
        .promo-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--cyan), var(--blue), transparent 30%);
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .inner-content {
            position: relative;
            background: #0d1117;
            padding: 16px 32px;
            border-radius: 13px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 1;
        }

        .text-label {
            color: #8b949e;
            text-transform: uppercase;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.5px;
        }

        .code-display {
            color: #fff;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
            cursor: pointer;
            transition: 0.2s;
        }

        .code-display:hover {
            color: var(--cyan);
            transform: scale(1.05);
        }

        .ad-badge {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.3);
            color: var(--cyan);
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 5px;
            font-weight: bold;
            opacity: 0.7;
        }

        /* Siker visszajelzés */
        .copy-hint {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--cyan);
            font-size: 12px;
            opacity: 0;
            transition: 0.3s;
        }

        .promo-card:active .copy-hint {
            opacity: 1;
            bottom: -25px;
        }
    </style>
</head>
<body>

    <div class="promo-card" onclick="copyCode()">
        <div class="inner-content">
            <span class="text-label">Use Code:</span>
            <span class="code-display" id="promoCode">FAKI</span>
            <span class="ad-badge">#AD</span>
        </div>
        <div class="copy-hint">Kód kimásolva!</div>
    </div>

    <script>
        function copyCode() {
            const code = document.getElementById('promoCode').innerText;
            navigator.clipboard.writeText(code);
            // Itt adhatsz hozzá extra effektet, ha szeretnél
        }
    </script>

</body>
</html>

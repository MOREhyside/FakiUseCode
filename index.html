<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --cyan: #00f2ff;
            --blue: #0072ff;
            --bg: #05070a;
            --card-bg: #0d1117;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .promo-card {
            position: relative;
            width: fit-content;
            padding: 2px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        /* Kereten körbefutó fénycsík */
        .promo-card::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150%; 
            height: 300%;
            transform: translate(-50%, -50%);
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                transparent 75%,
                var(--cyan) 90%,
                transparent 100%
            );
            animation: border-run 3s linear infinite;
        }

        @keyframes border-run {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .inner-content {
            position: relative;
            background: var(--card-bg);
            padding: 16px 32px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 1;
        }

        .text-label {
            color: #8b949e;
            text-transform: uppercase;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.5px;
        }

        .code-display {
            color: #fff;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        /* Világító #AD badge */
        .ad-badge {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
            animation: glow-pulse 1.5s infinite ease-in-out alternate;
        }

        @keyframes glow-pulse {
            from {
                box-shadow: 0 0 5px rgba(0, 242, 255, 0.3);
                border-color: rgba(0, 242, 255, 0.5);
                opacity: 0.7;
            }
            to {
                box-shadow: 0 0 15px rgba(0, 242, 255, 0.8);
                border-color: var(--cyan);
                opacity: 1;
            }
        }

        .promo-card:hover {
            transform: scale(1.05);
        }

        .copy-tooltip {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--cyan);
            color: black;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }

        .promo-card:active .copy-tooltip {
            opacity: 1;
            top: -45px;
        }
    </style>
</head>
<body>

    <div class="promo-card" onclick="copyCode()">
        <div class="copy-tooltip">MÁSOLVA!</div>
        <div class="inner-content">
            <span class="text-label">Use Code:</span>
            <span class="code-display" id="promoCode">FAKI</span>
            <span class="ad-badge">#AD</span>
        </div>
    </div>

    <script>
        function copyCode() {
            const code = document.getElementById('promoCode').innerText;
            navigator.clipboard.writeText(code);
        }
    </script>

</body>
</html>
